<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית חתול מחשב קלוריות</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* איפוס בסיסי ורקע שקוף */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* רקע שקוף לבקשתך */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rubik', sans-serif;
            overflow: hidden;
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* הבמה שמחזיקה את החתול והאוכל */
        .animation-stage {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* הגדרות החתול והתנועה שלו */
        .cat-wrapper {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 200px;
            height: 200px;
            animation: floatCat 3s ease-in-out infinite;
            z-index: 2;
        }

        /* אנימציית ציפה לחתול */
        @keyframes floatCat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* אנימציית מצמוץ לעיניים של החתול */
        .eyes {
            transform-origin: 100px 105px;
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 95%, 98%, 100% { transform: scaleY(1); }
            96%, 99% { transform: scaleY(0.1); }
        }

        /* הגדרת המסלול המעגלי של האוכל */
        .orbit {
            position: absolute;
            top: 0; 
            left: 0;
            width: 300px; 
            height: 300px;
            animation: spinOrbit 15s linear infinite;
            z-index: 1;
        }

        /* הגדרת פריטי האוכל - כדי שיישארו ישרים אנחנו מסובבים אותם נגד כיוון השעון */
        .food-item {
            position: absolute;
            font-size: 40px;
            left: var(--x);
            top: var(--y);
            animation: counterSpinOrbit 15s linear infinite;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.25)); /* הילה קלה כדי שיבלטו על כל רקע */
        }

        @keyframes spinOrbit { 
            100% { transform: rotate(360deg); } 
        }
        @keyframes counterSpinOrbit { 
            100% { transform: rotate(-360deg); } 
        }

        /* עיצוב הטקסט המתחלף */
        .text-slider {
            font-size: 24px;
            font-weight: 700;
            color: #ff9f43; /* צבע כתום תואם לחתול */
            text-align: center;
            min-height: 40px;
            padding: 5px 15px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            /* הוספת קו מתאר לבן וצל כדי שהטקסט יהיה קריא גם על רקעים כהים באפליקציה שלך */
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 6px rgba(0,0,0,0.15);
        }

        /* מחלקות לאנימציית החלפת הטקסט (מנוהל דרך JS) */
        .text-fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
        .text-fade-in {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="animation-stage">
            
            <!-- מערכת המסלול המעגלי של האוכל -->
            <div class="orbit">
                <div class="food-item" style="--x: 130px; --y: 20px;">🍔</div>
                <div class="food-item" style="--x: 225px; --y: 75px;">🍣</div>
                <div class="food-item" style="--x: 225px; --y: 185px;">🍕</div>
                <div class="food-item" style="--x: 130px; --y: 240px;">🍝</div>
                <div class="food-item" style="--x: 35px; --y: 185px;">🥑</div>
                <div class="food-item" style="--x: 35px; --y: 75px;">🍩</div>
            </div>

            <!-- החתול הכתום מבוסס SVG -->
            <div class="cat-wrapper">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="cat-shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15" />
                        </filter>
                    </defs>
                    
                    <g filter="url(#cat-shadow)">
                        <!-- זנב -->
                        <path d="M 140,160 Q 180,180 180,140 Q 180,110 160,110" fill="none" stroke="#e18b2c" stroke-width="16" stroke-linecap="round" />
                        
                        <!-- גוף -->
                        <path d="M 50,180 Q 100,220 150,180 L 140,110 Q 100,100 60,110 Z" fill="#ffb142" />

                        <!-- אוזניים (בחוץ ובפנים) -->
                        <polygon points="45,110 25,35 90,65" fill="#ffb142" />
                        <polygon points="155,110 175,35 110,65" fill="#ffb142" />
                        <polygon points="52,100 35,52 82,75" fill="#ffcccc" />
                        <polygon points="148,100 165,52 118,75" fill="#ffcccc" />

                        <!-- ראש -->
                        <ellipse cx="100" cy="115" rx="75" ry="60" fill="#ffb142" />

                        <!-- פסים על המצח (ג'ינג'י קלאסי) -->
                        <path d="M 100,55 L 100,75 M 82,60 L 88,75 M 118,60 L 112,75" stroke="#e18b2c" stroke-width="5" stroke-linecap="round" />

                        <!-- לחיים לבנות ופרוותיות -->
                        <ellipse cx="78" cy="132" rx="22" ry="16" fill="#ffffff" />
                        <ellipse cx="122" cy="132" rx="22" ry="16" fill="#ffffff" />

                        <!-- אף ורדרד -->
                        <polygon points="94,122 106,122 100,130" fill="#ff7eb3" />

                        <!-- עיניים מונפשות -->
                        <g class="eyes">
                            <ellipse cx="65" cy="105" rx="11" ry="14" fill="#2d3436" />
                            <ellipse cx="135" cy="105" rx="11" ry="14" fill="#2d3436" />
                            <!-- השתקפות / ברק בעיניים -->
                            <circle cx="61" cy="100" r="4.5" fill="#ffffff" />
                            <circle cx="67" cy="111" r="2" fill="#ffffff" />
                            <circle cx="131" cy="100" r="4.5" fill="#ffffff" />
                            <circle cx="137" cy="111" r="2" fill="#ffffff" />
                        </g>

                        <!-- חיוך -->
                        <path d="M 85,132 Q 100,148 115,132" stroke="#2d3436" stroke-width="3" fill="transparent" stroke-linecap="round" />

                        <!-- סומק / לחיים ורודות -->
                        <ellipse cx="45" cy="122" rx="10" ry="6" fill="#ff7eb3" opacity="0.4" />
                        <ellipse cx="155" cy="122" rx="10" ry="6" fill="#ff7eb3" opacity="0.4" />

                        <!-- שפם -->
                        <line x1="10" y1="115" x2="45" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="5"  y1="132" x2="42" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="10" y1="149" x2="45" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        
                        <line x1="190" y1="115" x2="155" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="195" y1="132" x2="158" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="190" y1="149" x2="155" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

                        <!-- כפות רגליים מקדימה -->
                        <ellipse cx="70" cy="178" rx="18" ry="14" fill="#e18b2c" />
                        <ellipse cx="70" cy="175" rx="15" ry="11" fill="#ffb142" />
                        
                        <ellipse cx="130" cy="178" rx="18" ry="14" fill="#e18b2c" />
                        <ellipse cx="130" cy="175" rx="15" ry="11" fill="#ffb142" />
                    </g>
                </svg>
            </div>
        </div>

        <!-- אזור הטקסט המתחלף -->
        <div class="text-slider" id="animated-text">מחשב קלוריות</div>
    </div>

    <!-- לוגיקת החלפת הטקסט -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const texts = [
                "מחשב קלוריות", 
                "בודק ערכים תזונתיים", 
                "בודק חלבון, פחמימות ושומן"
            ];
            let currentIndex = 0;
            const textElement = document.getElementById("animated-text");

            // הפעלת החלפה כל 3 שניות
            setInterval(() => {
                // שלב 1: העלמת הטקסט
                textElement.classList.add("text-fade-out");
                
                setTimeout(() => {
                    // שלב 2: החלפת התוכן והצגתו מחדש בזמן שהוא מוסתר
                    currentIndex = (currentIndex + 1) % texts.length;
                    textElement.innerText = texts[currentIndex];
                    
                    textElement.classList.remove("text-fade-out");
                    textElement.classList.add("text-fade-in");

                    // שלב 3: ניקוי מחלקת ההופעה כדי שהאנימציה תוכל לרוץ שוב
                    setTimeout(() => {
                        textElement.classList.remove("text-fade-in");
                    }, 500); 
                }, 500); // ממתין חצי שנייה עד שהטקסט יעלם לחלוטין
            }, 3000); 
        });
    </script>
</body>
</html>
