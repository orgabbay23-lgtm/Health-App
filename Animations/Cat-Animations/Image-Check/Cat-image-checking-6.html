<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית חתול וגור כלבים</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        /* איפוס בסיסי ורקע שקוף */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rubik', sans-serif;
            overflow: hidden;
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px; /* צומצם הרווח בין האנימציה לטקסט */
            width: 100%;
            max-width: 450px;
        }

        .animation-stage {
            position: relative;
            width: 350px;
            height: 250px; /* גובה מצומצם כדי למנוע רווח גדול מדי למטה */
        }

        /* 1. אנימציית הטקסט של הנביחה - קופץ מלמעלה */
        .bark-alert {
            position: absolute;
            top: 10px;
            left: 210px;
            transform-origin: center;
            animation: barkShow 8s infinite;
            z-index: 5;
        }
        @keyframes barkShow {
            0%, 19% { opacity: 0; transform: scale(0); }
            20% { opacity: 1; transform: scale(1.2) rotate(-10deg); }
            21% { opacity: 1; transform: scale(1) rotate(10deg); }
            22% { opacity: 1; transform: scale(1.1) rotate(-5deg); }
            24%, 100% { opacity: 0; transform: scale(0); }
        }

        /* 2. עוטף החתול - קופץ במקום מבהלה ואז מתקרב (בלי לברוח מהמסך) */
        .cat-story-mover {
            position: absolute;
            top: 30px;
            left: 60px;
            animation: storyMover 8s infinite;
            z-index: 3;
        }
        @keyframes storyMover {
            0%, 20% { transform: translate(0, 0); } 
            22% { transform: translate(-10px, -40px); } /* קפיצת בהלה למעלה ושמאלה */
            25%, 45% { transform: translate(-25px, 0); } /* נוחת צעד אחורה ומסתכל */
            50%, 90% { transform: translate(-10px, 0); } /* מתקרב צעד לכלב */
            95%, 100% { transform: translate(0, 0); } 
        }

        .cat-wrapper {
            width: 200px;
            height: 200px;
            animation: floatCat 4s ease-in-out infinite;
        }
        @keyframes floatCat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        /* מצבי העיניים של החתול (רגיל / מבוהל / מסתכל על הכלב) */
        .cat-eyes-normal {
            transform-origin: 100px 105px;
            animation: eyesNormal 8s infinite, blink 4s infinite;
        }
        @keyframes eyesNormal {
            0%, 20% { opacity: 1; transform: translate(0, 0); }
            20.1%, 45% { opacity: 0; } /* נעלמות בזמן הבהלה */
            45.1%, 49% { opacity: 1; transform: translate(0, 0); }
            50%, 90% { opacity: 1; transform: translate(8px, 6px); } /* מבט ימינה ולמטה לעבר הגור */
            91%, 100% { opacity: 1; transform: translate(0, 0); }
        }
        @keyframes blink {
            0%, 95%, 98%, 100% { transform: scaleY(1); }
            96%, 99% { transform: scaleY(0.1); }
        }

        /* עיניים גדולות מבהלה */
        .cat-eyes-scared { animation: eyesScared 8s infinite; }
        @keyframes eyesScared {
            0%, 20% { opacity: 0; }
            20.1%, 45% { opacity: 1; } 
            45.1%, 100% { opacity: 0; }
        }

        /* זנב סומר מהפחד */
        .cat-tail-scared { animation: tailScared 8s infinite; }
        @keyframes tailScared {
            0%, 20% { stroke-width: 16px; stroke: #e18b2c; }
            20.1%, 45% { stroke-width: 35px; stroke: #ff9f43; } 
            45.1%, 100% { stroke-width: 16px; stroke: #e18b2c; }
        }

        /* היד *הימנית* של החתול (הקרובה לכלב) נעלמת בזמן ליטוף */
        .cat-arm-right { animation: hideRightArm 8s infinite; }
        @keyframes hideRightArm {
            0%, 49% { opacity: 1; }
            50%, 90% { opacity: 0; } /* מסתתרת כשהוא מלטף */
            91%, 100% { opacity: 1; }
        }

        /* יד הליטוף שנשלחת ישירות לראש של הכלב */
        .petting-arm-group {
            transform-origin: 145px 140px; /* הכתף הימנית של החתול */
            animation: showPetting 8s infinite, patPat 0.8s infinite;
        }
        @keyframes showPetting {
            0%, 49% { opacity: 0; }
            50%, 90% { opacity: 1; }
            91%, 100% { opacity: 0; }
        }
        @keyframes patPat {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); } /* תנועת ליטוף מטה על הראש */
        }

        /* 3. הגור הקטן והמתוק (מוזז ימינה כדי לא להיות מוסתר) */
        .puppy-story-mover {
            position: absolute;
            top: 100px;
            left: 220px; /* הוזז מספיק ימינה כדי שייראה בבירור */
            width: 120px;
            height: 120px;
            animation: puppyMover 8s infinite;
            z-index: 2;
        }
        @keyframes puppyMover {
            0%, 25% { transform: translateX(150px); opacity: 0; } /* מחוץ למסך מימין */
            30%, 90% { transform: translateX(0); opacity: 1; } /* נכנס ועומד ליד החתול */
            95%, 100% { transform: translateX(150px); opacity: 0; }
        }

        /* קשקוש זנב נרגש לגור */
        .puppy-tail {
            transform-origin: 80px 50px;
            animation: puppyWag 0.2s infinite alternate;
        }
        @keyframes puppyWag {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        /* הלחתה (הוצאת לשון) של הגור */
        .puppy-tongue {
            transform-origin: 24px 58px;
            animation: puppyPant 0.3s infinite alternate;
        }
        @keyframes puppyPant {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(1.3); }
        }

        /* ענן אבק כשנבהלים אחורה */
        .dust-cloud {
            position: absolute;
            top: 180px;
            left: 80px;
            animation: dustPoof 8s infinite;
            z-index: 4;
        }
        @keyframes dustPoof {
            0%, 21% { opacity: 0; transform: scale(0.5) translateX(0); }
            22% { opacity: 1; transform: scale(1) translateX(0); }
            26% { opacity: 0; transform: scale(1.5) translateX(-40px); }
            27%, 100% { opacity: 0; }
        }

        /* 4. לבבות שעפים כשמלטפים את הכלב */
        .puppy-hearts {
            position: absolute;
            top: 60px;
            left: 240px;
            animation: showHearts 8s infinite;
        }
        @keyframes showHearts {
            0%, 55% { opacity: 0; }
            56%, 88% { opacity: 1; }
            89%, 100% { opacity: 0; }
        }
        .heart {
            animation: floatUp 1.5s infinite;
            opacity: 0;
        }
        .h2 { animation-delay: 0.75s; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; }
            100% { transform: translateY(-30px) scale(1.2); opacity: 0; }
        }

        /* עיצוב הטקסט המתחלף */
        .text-slider {
            font-size: 24px;
            font-weight: 700;
            color: #ff9f43;
            text-align: center;
            min-height: 40px;
            width: 100%;
            padding: 5px 15px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 6px rgba(0,0,0,0.15);
        }

        .text-fade-out { opacity: 0; transform: translateY(-10px); }
        .text-fade-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="animation-stage">
            
            <!-- נביחה ענקית שמופיעה פתאום -->
            <div class="bark-alert">
                <svg viewBox="0 0 150 100" width="150" height="100">
                    <path d="M 10 50 L 30 20 L 50 35 L 80 10 L 100 35 L 140 20 L 120 60 L 145 80 L 100 85 L 80 100 L 50 85 L 15 90 Z" fill="#ff4757" stroke="#2f3542" stroke-width="3"/>
                    <text x="75" y="65" font-size="32" font-weight="900" font-family="Rubik, sans-serif" fill="#fff" text-anchor="middle">האו!!!</text>
                </svg>
            </div>

            <!-- ענן אבק כשקופצים אחורה -->
            <div class="dust-cloud">
                <svg viewBox="0 0 100 50" width="100" height="50">
                    <circle cx="20" cy="30" r="15" fill="#dfe6e9" opacity="0.9"/>
                    <circle cx="50" cy="20" r="20" fill="#dfe6e9" opacity="0.9"/>
                    <circle cx="80" cy="30" r="12" fill="#dfe6e9" opacity="0.9"/>
                </svg>
            </div>

            <!-- הגור הקטן והחמוד - סודר כדי שייראה תלת-מימדי וברור -->
            <div class="puppy-story-mover">
                <div class="puppy-wrapper">
                    <svg viewBox="0 0 100 100" width="120" height="120">
                        <defs>
                            <filter id="puppy-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="5" stdDeviation="5" flood-opacity="0.15" />
                            </filter>
                        </defs>
                        <g filter="url(#puppy-shadow)">
                            <!-- זנב כלבלב -->
                            <path class="puppy-tail" d="M 80 50 Q 95 30 90 20" stroke="#8B4513" stroke-width="6" stroke-linecap="round" fill="none"/>
                            <!-- גוף -->
                            <ellipse cx="60" cy="70" rx="25" ry="20" fill="#D2B48C"/>
                            <!-- רגליים אחוריות -->
                            <ellipse cx="75" cy="85" rx="6" ry="10" fill="#6d360f"/>
                            <!-- רגליים קדמיות -->
                            <ellipse cx="45" cy="85" rx="6" ry="10" fill="#8B4513"/>
                            <!-- ראש -->
                            <ellipse cx="35" cy="45" rx="22" ry="20" fill="#D2B48C"/>
                            <!-- אוזן אחורית (מוסתרת מעט) -->
                            <path d="M 45 30 Q 65 30 55 55 Q 45 50 42 35" fill="#6d360f"/>
                            
                            <!-- פה ואף -->
                            <ellipse cx="20" cy="52" rx="10" ry="8" fill="#FFF8DC"/>
                            <ellipse cx="16" cy="50" rx="3" ry="2" fill="#2d3436"/>
                            <!-- לשון מונפשת -->
                            <path class="puppy-tongue" d="M 18 58 Q 18 68 22 68 Q 26 68 24 58 Z" fill="#ff7675"/>
                            <!-- עיניים חמודות -->
                            <circle cx="28" cy="40" r="3.5" fill="#2d3436"/>
                            <circle cx="40" cy="40" r="3.5" fill="#2d3436"/>
                            <circle cx="27" cy="39" r="1.5" fill="#fff"/>
                            <circle cx="39" cy="39" r="1.5" fill="#fff"/>
                            <!-- אוזן קדמית גלויה -->
                            <path d="M 25 30 Q 5 30 15 55 Q 25 50 28 35" fill="#8B4513"/>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- לבבות ליטוף מעל הכלב -->
            <div class="puppy-hearts">
                <svg viewBox="0 0 50 50" width="50" height="50">
                    <path class="heart h1" d="M 25 15 Q 15 0 5 15 Q 5 25 25 40 Q 45 25 45 15 Q 35 0 25 15 Z" fill="#ff6b81"/>
                    <path class="heart h2" d="M 25 15 Q 15 0 5 15 Q 5 25 25 40 Q 45 25 45 15 Q 35 0 25 15 Z" fill="#ff4757" transform="scale(0.6) translate(30, 20)"/>
                </svg>
            </div>

            <!-- החתול והתנועה הכללית שלו -->
            <div class="cat-story-mover">
                <div class="cat-wrapper">
                    <!-- חשוב: overflow: visible מאפשר ליד לצאת מחוץ לגבולות ה-SVG כדי ללטף -->
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
                        <defs>
                            <filter id="cat-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15" />
                            </filter>
                        </defs>
                        <g filter="url(#cat-shadow)">
                            <!-- זנב -->
                            <g class="tail-wag">
                                <path class="cat-tail-scared" d="M 140,160 Q 180,180 180,140 Q 180,110 160,110" fill="none" stroke="#e18b2c" stroke-linecap="round" />
                            </g>

                            <!-- גוף -->
                            <path d="M 50,180 Q 100,220 150,180 L 140,110 Q 100,100 60,110 Z" fill="#ffb142" />

                            <!-- אוזניים -->
                            <polygon points="45,110 25,35 90,65" fill="#ffb142" />
                            <polygon points="52,100 35,52 82,75" fill="#ffcccc" />
                            <polygon points="155,110 175,35 110,65" fill="#ffb142" />
                            <polygon points="148,100 165,52 118,75" fill="#ffcccc" />

                            <!-- ראש -->
                            <ellipse cx="100" cy="115" rx="75" ry="60" fill="#ffb142" />

                            <!-- פסים על המצח -->
                            <path d="M 100,55 L 100,75 M 82,60 L 88,75 M 118,60 L 112,75" stroke="#e18b2c" stroke-width="5" stroke-linecap="round" />

                            <!-- לחיים ואף -->
                            <ellipse cx="78" cy="132" rx="22" ry="16" fill="#ffffff" />
                            <ellipse cx="122" cy="132" rx="22" ry="16" fill="#ffffff" />
                            <polygon points="94,122 106,122 100,130" fill="#ff7eb3" />
                            <path d="M 90,134 Q 100,136 110,134" stroke="#2d3436" stroke-width="2.5" fill="transparent" stroke-linecap="round" />

                            <!-- שפם -->
                            <line x1="10" y1="115" x2="40" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                            <line x1="5"  y1="132" x2="38" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                            <line x1="10" y1="149" x2="40" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                            <line x1="190" y1="115" x2="160" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                            <line x1="195" y1="132" x2="162" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                            <line x1="190" y1="149" x2="160" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

                            <!-- עיניים מונפשות (רגילות - כולל מבט למטה לעבר הכלב) -->
                            <g class="cat-eyes-normal">
                                <ellipse cx="65" cy="105" rx="11" ry="14" fill="#2d3436" />
                                <ellipse cx="135" cy="105" rx="11" ry="14" fill="#2d3436" />
                                <circle cx="61" cy="100" r="4.5" fill="#ffffff" />
                                <circle cx="67" cy="111" r="2" fill="#ffffff" />
                                <circle cx="131" cy="100" r="4.5" fill="#ffffff" />
                                <circle cx="137" cy="111" r="2" fill="#ffffff" />
                            </g>

                            <!-- עיניים מונפשות (מפוחדות) - מופיעות רק בקפיצה -->
                            <g class="cat-eyes-scared">
                                <ellipse cx="65" cy="105" rx="16" ry="16" fill="#ffffff" stroke="#2d3436" stroke-width="2"/>
                                <circle cx="65" cy="105" r="3" fill="#2d3436" />
                                <ellipse cx="135" cy="105" rx="16" ry="16" fill="#ffffff" stroke="#2d3436" stroke-width="2"/>
                                <circle cx="135" cy="105" r="3" fill="#2d3436" />
                            </g>

                            <!-- כף רגל שמאל הרגילה -->
                            <g class="cat-arm-left">
                                <ellipse cx="70" cy="178" rx="12" ry="15" fill="#e18b2c" transform="rotate(20 70 178)"/>
                                <ellipse cx="70" cy="178" rx="9" ry="11" fill="#ffb142" transform="rotate(20 70 178)"/>
                            </g>

                            <!-- כף רגל ימין עומדת (נעלמת בזמן הליטוף כדי להפוך ליד נשלחת!) -->
                            <g class="cat-arm-right">
                                <ellipse cx="145" cy="178" rx="12" ry="15" fill="#e18b2c" transform="rotate(-20 145 178)"/>
                                <ellipse cx="145" cy="178" rx="9" ry="11" fill="#ffb142" transform="rotate(-20 145 178)"/>
                            </g>

                            <!-- יד מלטפת שיוצאת מהכתף הימנית ונמתחת לעבר ראש הכלב -->
                            <g class="petting-arm-group">
                                <!-- זרוע מתוחה החוצה ימינה ולמעלה מעט (לכיוון ראש הכלב) -->
                                <path d="M 145 140 Q 160 100 185 105" fill="none" stroke="#ffb142" stroke-width="18" stroke-linecap="round"/>
                                <!-- כף יד מלטפת בקצה הזרוע -->
                                <g transform="translate(185, 105)">
                                    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#e18b2c" transform="rotate(-15)"/>
                                    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#ffb142" transform="rotate(-15)"/>
                                    <!-- אצבעות קטנות -->
                                    <path d="M -2 10 L 2 5 M -4 0 L 2 0 M -2 -10 L 2 -5" stroke="#d35400" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
                                </g>
                            </g>
                        </g>
                    </svg>
                </div>
            </div>

        </div>

        <!-- אזור הטקסט המתחלף בתחתית - מיושר כראוי לאמצע -->
        <div class="text-slider" id="animated-text">בודק מרכיבים בתמונה</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const texts = [
                "בודק מרכיבים בתמונה", 
                "מזהה סוג מזון", 
                "עוד רגע בבקשה"
            ];
            let currentIndex = 0;
            const textElement = document.getElementById("animated-text");

            setInterval(() => {
                textElement.classList.add("text-fade-out");
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % texts.length;
                    textElement.innerText = texts[currentIndex];
                    
                    textElement.classList.remove("text-fade-out");
                    textElement.classList.add("text-fade-in");

                    setTimeout(() => {
                        textElement.classList.remove("text-fade-in");
                    }, 500); 
                }, 500); 
            }, 3000); 
        });
    </script>
</body>
</html>
