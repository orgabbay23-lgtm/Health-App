<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית חתול בודק אוכל במחשב</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* איפוס בסיסי ורקע שקוף */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rubik', sans-serif;
            overflow: hidden;
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* הבמה שמחזיקה את החתול והסביבה */
        .animation-stage {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* הגדרות החתול והתנועה שלו (ריחוף קל לתחושת חיות) */
        .cat-wrapper {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 200px;
            height: 200px;
            animation: floatCat 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        /* אנימציה לעיניים שסורקות את התמונה/מסך */
        .eyes {
            transform-origin: 100px 105px;
            animation: scanEyes 4s infinite, blink 4s infinite;
        }

        @keyframes scanEyes {
            0%, 15% { transform: translate(-4px, -2px); } /* מסתכל שמאלה ולמעלה על ההולוגרמה */
            25%, 40% { transform: translate(4px, -2px); } /* קורא שורה ימינה */
            50%, 65% { transform: translate(-4px, 2px); } /* יורד למטה */
            75%, 90% { transform: translate(4px, 2px); }
            100% { transform: translate(-4px, -2px); }
        }

        @keyframes blink {
            0%, 95%, 98%, 100% { transform: scaleY(1); }
            96%, 99% { transform: scaleY(0.1); }
        }

        /* בועת המחשבה שמרחפת */
        .thought-bubble {
            animation: bubbleFloat 3s ease-in-out infinite;
            transform-origin: 160px 50px;
        }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }

        /* טקסטים קטנים של נתונים תזונתיים שקופצים החוצה במחשבה */
        .nutrition-data {
            font-size: 10px;
            font-weight: bold;
            font-family: 'Rubik', sans-serif;
            fill: #1dd1a1;
            opacity: 0;
            animation: popData 4s infinite;
        }

        .data-1 { animation-delay: 0.5s; }
        .data-2 { animation-delay: 1.8s; }
        .data-3 { animation-delay: 3.1s; }

        @keyframes popData {
            0% { transform: translateY(5px) scale(0.8); opacity: 0; }
            15% { transform: translateY(0px) scale(1.1); opacity: 1; }
            30% { transform: translateY(-5px) scale(1); opacity: 0; }
            100% { opacity: 0; }
        }

        /* אנימציית שתיית קפה */
        .coffee-arm {
            transform-origin: 40px 162px;
            animation: drinkCoffee 8s infinite;
        }

        @keyframes drinkCoffee {
            0%, 60% { transform: translate(0, 0) rotate(0deg); }
            65%, 75% { transform: translate(40px, -26px) rotate(15deg); }
            80%, 100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* אנימציית לחיצה על העכבר */
        .mouse-paw {
            transform-origin: 156px 165px;
            animation: clickMouse 4s infinite;
        }

        @keyframes clickMouse {
            0%, 70%, 100% { transform: translateY(0); }
            75% { transform: translateY(2px); }
            80% { transform: translateY(0); }
            85% { transform: translateY(2px); }
            90% { transform: translateY(0); }
        }

        /* אדים מהקפה */
        .steam {
            animation: steamRise 3s infinite ease-out;
            transform-origin: 35px 140px;
        }
        .steam-2 { animation-delay: 1.5s; }

        @keyframes steamRise {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.6; }
            80% { transform: translateY(-15px) scale(1.2); opacity: 0; }
            100% { opacity: 0; }
        }

        /* קשקוש זנב */
        .tail-wag {
            transform-origin: 140px 160px;
            animation: wag 4s ease-in-out infinite;
        }

        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }

        /* אוזן קופצת לריכוז */
        .ear-twitch {
            transform-origin: 45px 110px;
            animation: twitch 8s infinite;
        }

        @keyframes twitch {
            0%, 30%, 36%, 100% { transform: rotate(0deg); }
            33% { transform: rotate(-10deg); }
        }

        /* עיצוב הטקסט המתחלף */
        .text-slider {
            font-size: 24px;
            font-weight: 700;
            color: #ff9f43;
            text-align: center;
            min-height: 40px;
            padding: 5px 15px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 6px rgba(0,0,0,0.15);
        }

        .text-fade-out { opacity: 0; transform: translateY(-10px); }
        .text-fade-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="animation-stage">
            
            <div class="cat-wrapper">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- צל כללי -->
                        <filter id="cat-shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15" />
                        </filter>
                    </defs>

                    <g filter="url(#cat-shadow)">
                        
                        <!-- זנב שמקשקש מתוך ריכוז -->
                        <g class="tail-wag">
                            <path d="M 140,160 Q 180,180 180,140 Q 180,110 160,110" fill="none" stroke="#e18b2c" stroke-width="16" stroke-linecap="round" />
                        </g>

                        <!-- גוף החתול -->
                        <path d="M 50,180 Q 100,220 150,180 L 140,110 Q 100,100 60,110 Z" fill="#ffb142" />

                        <!-- אוזן שמאל - קופצת במחשבה -->
                        <g class="ear-twitch">
                            <polygon points="45,110 25,35 90,65" fill="#ffb142" />
                            <polygon points="52,100 35,52 82,75" fill="#ffcccc" />
                        </g>
                        <!-- אוזן ימין -->
                        <polygon points="155,110 175,35 110,65" fill="#ffb142" />
                        <polygon points="148,100 165,52 118,75" fill="#ffcccc" />

                        <!-- ראש -->
                        <ellipse cx="100" cy="115" rx="75" ry="60" fill="#ffb142" />

                        <!-- פסים על המצח -->
                        <path d="M 100,55 L 100,75 M 82,60 L 88,75 M 118,60 L 112,75" stroke="#e18b2c" stroke-width="5" stroke-linecap="round" />

                        <!-- לחיים לבנות -->
                        <ellipse cx="78" cy="132" rx="22" ry="16" fill="#ffffff" />
                        <ellipse cx="122" cy="132" rx="22" ry="16" fill="#ffffff" />

                        <!-- אף -->
                        <polygon points="94,122 106,122 100,130" fill="#ff7eb3" />

                        <!-- פה מתרכז -->
                        <path d="M 90,134 Q 100,136 110,134" stroke="#2d3436" stroke-width="2.5" fill="transparent" stroke-linecap="round" />

                        <!-- שפם -->
                        <line x1="10" y1="115" x2="40" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="5"  y1="132" x2="38" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="10" y1="149" x2="40" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="190" y1="115" x2="160" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="195" y1="132" x2="162" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="190" y1="149" x2="160" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

                        <!-- עיניים מונפשות גדולות וחמודות (בלי משקפיים) -->
                        <g class="eyes">
                            <ellipse cx="65" cy="105" rx="11" ry="14" fill="#2d3436" />
                            <ellipse cx="135" cy="105" rx="11" ry="14" fill="#2d3436" />
                            <!-- השתקפות / ברק בעיניים -->
                            <circle cx="61" cy="100" r="4.5" fill="#ffffff" />
                            <circle cx="67" cy="111" r="2" fill="#ffffff" />
                            <circle cx="131" cy="100" r="4.5" fill="#ffffff" />
                            <circle cx="137" cy="111" r="2" fill="#ffffff" />
                        </g>

                        <!-- שולחן עבודה עליו מונח המחשב -->
                        <rect x="10" y="174" width="180" height="6" rx="3" fill="#a4b0be"/>

                        <!-- מחשב נייד -->
                        <g class="laptop">
                            <!-- מסך -->
                            <rect x="65" y="140" width="70" height="36" rx="3" fill="#dfe6e9" stroke="#b2bec3" stroke-width="2"/>
                            <!-- בסיס/מקלדת -->
                            <rect x="60" y="172" width="80" height="4" rx="2" fill="#636e72"/>
                            <!-- לוגו (כפתור של פאו/כף רגל חמודה) -->
                            <circle cx="100" cy="156" r="4" fill="#b2bec3"/>
                        </g>

                        <!-- בועת מחשבה שמרחפת מעל החתול -->
                        <g class="thought-bubble">
                            <!-- בועות קטנות שמובילות מהראש -->
                            <circle cx="105" cy="70" r="2.5" fill="#ffffff" stroke="#00cec9" stroke-width="1.5"/>
                            <circle cx="115" cy="60" r="4.5" fill="#ffffff" stroke="#00cec9" stroke-width="1.5"/>
                            <circle cx="128" cy="50" r="7" fill="#ffffff" stroke="#00cec9" stroke-width="1.5"/>
                            
                            <!-- הענן עצמו -->
                            <path d="M 135 45
                                     A 12 12 0 0 1 150 35
                                     A 18 18 0 0 1 180 40
                                     A 15 15 0 0 1 185 60
                                     A 14 14 0 0 1 160 68
                                     A 15 15 0 0 1 140 60
                                     A 10 10 0 0 1 135 45 Z" 
                                  fill="#ffffff" stroke="#00cec9" stroke-width="2" stroke-linejoin="round"/>
                            
                            <!-- איור האוכל בתוך בועת המחשבה -->
                            <text x="160" y="52" font-size="20" text-anchor="middle" dominant-baseline="middle">🍔</text>

                            <!-- מילים שצצות מתוך המחשבה (ערכים תזונתיים) -->
                            <text x="145" y="32" class="nutrition-data data-1" text-anchor="middle">חלבון</text>
                            <text x="175" y="40" class="nutrition-data data-2" text-anchor="middle">פחמימה</text>
                            <text x="160" y="66" class="nutrition-data data-3" text-anchor="middle">קלוריות</text>
                        </g>

                        <!-- כף רגל ימנית (שמאל במסך) + כוס קפה באנימציית שתייה -->
                        <g class="coffee-arm">
                            <!-- ידית הכוס -->
                            <path d="M 32,156 Q 24,156 24,163 Q 24,170 32,170" fill="none" stroke="#ff7675" stroke-width="4" stroke-linecap="round"/>
                            <!-- כוס הקפה -->
                            <rect x="32" y="150" width="20" height="25" rx="3" fill="#ff7675"/>
                            <!-- לב קטן על הכוס -->
                            <path d="M 42,165 A 2 2 0 0 0 38,165 A 2 2 0 0 0 40,169 Z" fill="#ffffff" opacity="0.8"/>
                            
                            <!-- אדים עולים מהקפה -->
                            <path class="steam steam-1" d="M 38,145 Q 35,138 40,134 T 38,125" fill="none" stroke="#dfe6e9" stroke-width="2" stroke-linecap="round"/>
                            <path class="steam steam-2" d="M 46,146 Q 49,140 45,135 T 47,126" fill="none" stroke="#dfe6e9" stroke-width="2" stroke-linecap="round"/>

                            <!-- כף הרגל שאוחזת בכוס -->
                            <ellipse cx="42" cy="162" rx="11" ry="8" fill="#e18b2c" transform="rotate(-15 42 162)"/>
                            <ellipse cx="42" cy="162" rx="8" ry="5" fill="#ffb142" transform="rotate(-15 42 162)"/>
                        </g>

                        <!-- כף רגל שמאלית (ימין במסך) משתמשת בעכבר המחשב -->
                        <g class="mouse-group">
                            <!-- עכבר מחשב -->
                            <rect x="145" y="167" width="14" height="8" rx="4" fill="#b2bec3"/>
                            <!-- חוט עכבר קטן -->
                            <path d="M 145,171 Q 135,171 135,174" fill="none" stroke="#636e72" stroke-width="1.5"/>
                            
                            <!-- כף הרגל המקליקה -->
                            <g class="mouse-paw">
                                <ellipse cx="152" cy="165" rx="10" ry="7" fill="#e18b2c"/>
                                <ellipse cx="152" cy="165" rx="7" ry="4" fill="#ffb142"/>
                            </g>
                        </g>

                    </g>
                </svg>
            </div>
        </div>

        <!-- אזור הטקסט המתחלף -->
        <div class="text-slider" id="animated-text">בודק מרכיבים בתמונה</div>
    </div>

    <!-- לוגיקת החלפת הטקסט (נשארה זהה) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const texts = [
                "בודק מרכיבים בתמונה", 
                "מחשב כמויות מדויקות", 
                "עוד רגע בבקשה"
            ];
            let currentIndex = 0;
            const textElement = document.getElementById("animated-text");

            setInterval(() => {
                textElement.classList.add("text-fade-out");
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % texts.length;
                    textElement.innerText = texts[currentIndex];
                    
                    textElement.classList.remove("text-fade-out");
                    textElement.classList.add("text-fade-in");

                    setTimeout(() => {
                        textElement.classList.remove("text-fade-in");
                    }, 500); 
                }, 500); 
            }, 3000); 
        });
    </script>
</body>
</html>
