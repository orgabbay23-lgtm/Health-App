<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנימציית חתול חושב ומחשב</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* איפוס בסיסי ורקע שקוף */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* רקע שקוף לבקשתך */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rubik', sans-serif;
            overflow: hidden;
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* הבמה שמחזיקה את החתול והסמלים */
        .animation-stage {
            position: relative;
            width: 300px;
            height: 300px;
        }

        /* הגדרות החתול והתנועה שלו */
        .cat-wrapper {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 200px;
            height: 200px;
            animation: floatCat 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* אנימציה מורכבת לעיניים (חושב, מסתכל למעלה ולצדדים) - מחזור של 8 שניות */
        .eyes {
            transform-origin: 100px 105px;
            animation: thinkEyes 8s infinite, blink 4s infinite;
        }

        @keyframes thinkEyes {
            0%, 20% { transform: translate(0, 0); } /* מסתכל ישר וכותב */
            25%, 45% { transform: translate(-6px, -8px); } /* מרים מבט שמאלה למעלה (חושב) */
            50%, 70% { transform: translate(6px, -8px); }  /* מעביר מבט ימינה למעלה */
            75%, 100% { transform: translate(0, 0); } /* חוזר לכתוב */
        }

        @keyframes blink {
            0%, 95%, 98%, 100% { transform: scaleY(1); }
            96%, 99% { transform: scaleY(0.1); }
        }

        /* אנימציית כתיבה ליד עם העיפרון */
        .writing-arm {
            transform-origin: 135px 162px;
            animation: writeScribble 8s infinite;
        }

        @keyframes writeScribble {
            /* קטע כתיבה 1 */
            0%, 2% { transform: translate(0, 0) rotate(0deg); }
            4% { transform: translate(-2px, 3px) rotate(-3deg); }
            6% { transform: translate(3px, -2px) rotate(4deg); }
            8% { transform: translate(-3px, 2px) rotate(-2deg); }
            10% { transform: translate(2px, -1px) rotate(3deg); }
            12% { transform: translate(-1px, 2px) rotate(-1deg); }
            15% { transform: translate(0, 0) rotate(0deg); }
            
            /* מרים את העיפרון וחושב */
            20%, 70% { transform: translate(8px, -15px) rotate(20deg); } 
            
            /* קטע כתיבה 2 אחרי החשיבה */
            75% { transform: translate(0, 0) rotate(0deg); }
            78% { transform: translate(-2px, 3px) rotate(-3deg); }
            80% { transform: translate(3px, -2px) rotate(4deg); }
            82% { transform: translate(-3px, 2px) rotate(-2deg); }
            84% { transform: translate(2px, -1px) rotate(3deg); }
            87%, 100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* אנימציית קשקוש הזנב מתוך ריכוז */
        .tail-wag {
            transform-origin: 140px 160px;
            animation: wag 4s ease-in-out infinite;
        }

        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }

        /* אנימציית אוזן קופצת (Ear twitch) לפרטים קטנים */
        .ear-twitch {
            transform-origin: 45px 110px;
            animation: twitch 8s infinite;
        }

        @keyframes twitch {
            0%, 30%, 36%, 100% { transform: rotate(0deg); }
            33% { transform: rotate(-10deg); }
        }

        /* סמלים מתמטיים שמרחפים מעל הראש */
        .math-symbol {
            font-size: 16px;
            font-weight: bold;
            font-family: 'Rubik', sans-serif;
            fill: #353b48;
            opacity: 0;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff;
        }

        /* מחזור ארוך של סמלים שצצים אחד אחרי השני */
        .sym-1 { animation: floatMath 8s ease-in infinite; animation-delay: 2.5s; }
        .sym-2 { animation: floatMath 8s ease-in infinite; animation-delay: 3.5s; }
        .sym-3 { animation: floatMath 8s ease-in infinite; animation-delay: 4.5s; }
        .sym-4 { animation: floatMath 8s ease-in infinite; animation-delay: 5.5s; }

        @keyframes floatMath {
            0% { transform: translateY(0px) scale(0.5) rotate(-15deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translateY(-45px) scale(1.3) rotate(10deg); opacity: 0.8; }
            60% { transform: translateY(-65px) scale(1) rotate(25deg); opacity: 0; }
            100% { transform: translateY(-65px); opacity: 0; }
        }

        /* עיצוב הטקסט המתחלף */
        .text-slider {
            font-size: 24px;
            font-weight: 700;
            color: #ff9f43;
            text-align: center;
            min-height: 40px;
            padding: 5px 15px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 6px rgba(0,0,0,0.15);
        }

        .text-fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
        .text-fade-in {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="animation-stage">
            
            <div class="cat-wrapper">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- צל כללי -->
                        <filter id="cat-shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15" />
                        </filter>
                    </defs>
                    
                    <g filter="url(#cat-shadow)">
                        <!-- זנב שמקשקש מתוך ריכוז -->
                        <g class="tail-wag">
                            <path d="M 140,160 Q 180,180 180,140 Q 180,110 160,110" fill="none" stroke="#e18b2c" stroke-width="16" stroke-linecap="round" />
                        </g>

                        <!-- סמלים מתמטיים שמרחפים ב"זמן מחשבה" -->
                        <text x="60" y="80" class="math-symbol sym-1">½ + ¼</text>
                        <text x="115" y="70" class="math-symbol sym-2">∑</text>
                        <text x="75" y="60" class="math-symbol sym-3">3.14</text>
                        <text x="130" y="85" class="math-symbol sym-4">%</text>
                        
                        <!-- גוף -->
                        <path d="M 50,180 Q 100,220 150,180 L 140,110 Q 100,100 60,110 Z" fill="#ffb142" />

                        <!-- אוזן שמאל - קופצת במחשבה -->
                        <g class="ear-twitch">
                            <polygon points="45,110 25,35 90,65" fill="#ffb142" />
                            <polygon points="52,100 35,52 82,75" fill="#ffcccc" />
                        </g>
                        <!-- אוזן ימין -->
                        <polygon points="155,110 175,35 110,65" fill="#ffb142" />
                        <polygon points="148,100 165,52 118,75" fill="#ffcccc" />

                        <!-- ראש -->
                        <ellipse cx="100" cy="115" rx="75" ry="60" fill="#ffb142" />

                        <!-- פסים על המצח -->
                        <path d="M 100,55 L 100,75 M 82,60 L 88,75 M 118,60 L 112,75" stroke="#e18b2c" stroke-width="5" stroke-linecap="round" />

                        <!-- לחיים לבנות -->
                        <ellipse cx="78" cy="132" rx="22" ry="16" fill="#ffffff" />
                        <ellipse cx="122" cy="132" rx="22" ry="16" fill="#ffffff" />

                        <!-- אף -->
                        <polygon points="94,122 106,122 100,130" fill="#ff7eb3" />

                        <!-- משקפי ראייה חנוניים ומתוקים -->
                        <circle cx="65" cy="105" r="16" fill="none" stroke="#2c3e50" stroke-width="3"/>
                        <circle cx="135" cy="105" r="16" fill="none" stroke="#2c3e50" stroke-width="3"/>
                        <!-- גשר המשקפיים -->
                        <line x1="81" y1="105" x2="119" y2="105" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                        <!-- זרועות המשקפיים -->
                        <path d="M 49,105 Q 35,100 30,110" fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
                        <path d="M 151,105 Q 165,100 170,110" fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>

                        <!-- עיניים מונפשות שמסתכלות למעלה בזמן חשיבה -->
                        <g class="eyes">
                            <ellipse cx="65" cy="105" rx="7" ry="10" fill="#2d3436" />
                            <ellipse cx="135" cy="105" rx="7" ry="10" fill="#2d3436" />
                            <!-- ברק -->
                            <circle cx="63" cy="102" r="3" fill="#ffffff" />
                            <circle cx="133" cy="102" r="3" fill="#ffffff" />
                        </g>

                        <!-- פה מתרכז (קו קטן ומעוקל מעט) -->
                        <path d="M 90,134 Q 100,136 110,134" stroke="#2d3436" stroke-width="2.5" fill="transparent" stroke-linecap="round" />

                        <!-- סומק -->
                        <ellipse cx="40" cy="122" rx="8" ry="5" fill="#ff7eb3" opacity="0.4" />
                        <ellipse cx="160" cy="122" rx="8" ry="5" fill="#ff7eb3" opacity="0.4" />

                        <!-- שפם -->
                        <line x1="10" y1="115" x2="40" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="5"  y1="132" x2="38" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="10" y1="149" x2="40" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        
                        <line x1="190" y1="115" x2="160" y2="122" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="195" y1="132" x2="162" y2="132" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
                        <line x1="190" y1="149" x2="160" y2="142" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

                        <!-- כף רגל שמאלית מחזיקה את הדף (בלוק כתיבה / קליפבורד) -->
                        <g transform="translate(60, 160) rotate(-15)">
                            <!-- לוח (קליפבורד) -->
                            <rect x="-35" y="-30" width="60" height="70" rx="4" fill="#dcdde1" stroke="#a4b0be" stroke-width="2"/>
                            <!-- דף נייר -->
                            <rect x="-31" y="-26" width="52" height="62" fill="#ffffff"/>
                            <!-- קליפס מתכת -->
                            <rect x="-15" y="-35" width="20" height="10" rx="2" fill="#747d8c"/>
                            <circle cx="-5" cy="-30" r="2" fill="#2f3542"/>
                            
                            <!-- שורות קשקוש על הנייר -->
                            <line x1="-25" y1="-10" x2="15" y2="-10" stroke="#b2bec3" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-25" y1="0" x2="5" y2="0" stroke="#b2bec3" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-25" y1="10" x2="10" y2="10" stroke="#b2bec3" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-25" y1="20" x2="15" y2="20" stroke="#b2bec3" stroke-width="2" stroke-linecap="round"/>

                            <!-- כף רגל שמאלית על הנייר -->
                            <ellipse cx="-15" cy="30" rx="12" ry="15" fill="#e18b2c" transform="rotate(30 -15 30)"/>
                            <ellipse cx="-15" cy="30" rx="9" ry="12" fill="#ffb142" transform="rotate(30 -15 30)"/>
                        </g>

                        <!-- כף רגל ימנית מונפשת שכאילו כותבת עם עיפרון -->
                        <g class="writing-arm">
                            <g transform="translate(115, 145)">
                                <!-- העיפרון -->
                                <g transform="translate(0, 0) rotate(-35)">
                                    <!-- חוד שחור -->
                                    <polygon points="-4,-10 4,-10 0,-20" fill="#2d3436"/>
                                    <!-- עץ חשוף -->
                                    <polygon points="-4,-10 4,-10 4,-3 -4,-3" fill="#ffeaa7"/>
                                    <!-- גוף העיפרון הצהוב -->
                                    <rect x="-4" y="-3" width="8" height="40" fill="#fbc531"/>
                                    <!-- חיבור מתכת אפור -->
                                    <rect x="-4" y="37" width="8" height="5" fill="#b2bec3"/>
                                    <!-- מחק ורוד -->
                                    <path d="M -4,42 L 4,42 L 4,48 Q 0,50 -4,48 Z" fill="#ff7675"/>
                                </g>

                                <!-- כף הרגל שמחזיקה את העיפרון -->
                                <ellipse cx="10" cy="15" rx="12" ry="16" fill="#e18b2c" transform="rotate(-30 10 15)"/>
                                <ellipse cx="10" cy="15" rx="9" ry="13" fill="#ffb142" transform="rotate(-30 10 15)"/>
                            </g>
                        </g>
                    </g>
                </svg>
            </div>
        </div>

        <!-- אזור הטקסט המתחלף -->
        <div class="text-slider" id="animated-text">בודק מרכיבים בתמונה</div>
    </div>

    <!-- לוגיקת החלפת הטקסט (נשארה זהה) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const texts = [
                "בודק מרכיבים בתמונה", 
                "מחשב כמויות מדויקות", 
                "עוד רגע בבקשה"
            ];
            let currentIndex = 0;
            const textElement = document.getElementById("animated-text");

            setInterval(() => {
                textElement.classList.add("text-fade-out");
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % texts.length;
                    textElement.innerText = texts[currentIndex];
                    
                    textElement.classList.remove("text-fade-out");
                    textElement.classList.add("text-fade-in");

                    setTimeout(() => {
                        textElement.classList.remove("text-fade-in");
                    }, 500); 
                }, 500); 
            }, 3000); 
        });
    </script>
</body>
</html>
